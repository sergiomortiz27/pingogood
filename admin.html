<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADMIN BINGO</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="styleAdmin.css">
<script src="admin.js" defer></script>

</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">

  <div class="login-box">

    <h2>🔐 Panel Administrador</h2>

    <input 
      type="password" 
      id="adminPass" 
      placeholder="Ingresa la clave"
      onkeypress="if(event.key==='Enter') login()"
    >

    <button onclick="login()">Ingresar</button>

    <p id="loginError" class="error"></p>

  </div>

</div>

<!-- PANEL ADMIN  OCULTO/VISIBLE -->
<div id="adminPanel" style="display:none;">

  <!-- WEB ADMIN -->
  <div class="container">

    <!-- Logout -->
    <div style="text-align:right;">
      <button onclick="logout()" class="logout-btn">
        Cerrar sesión
      </button>
    </div>

    <!-- Title -->
    <h1 style="text-align:center;">Panel Administrador</h1>

    <!-- 🔀 MODO -->
    <div class="modo">

    <label class="radio-btn">
      <input type="radio" name="modo" value="manual" checked onchange="setModo('manual')">
      <span>Manual</span>
    </label>

    <label class="radio-btn">
      <input type="radio" name="modo" value="auto" onchange="setModo('auto')">
      <span>Automático</span>
    </label>

  </div>

    <!-- 🔢 NÚMERO ACTUAL -->
    <div id="bigNumber" class="bigNumber">--</div>

    <!-- 🎛️ CONTROLES -->
    <div class="controls">
      <button onclick="iniciarJuego()">Iniciar</button>
      <button onclick="cantarNumero()">Cantar número</button>
      <button onclick="reiniciar()">Reiniciar</button>
    </div>

    <!-- 🎱 TABLERO -->
    <div class="bingo-board">

      <div class="col">
        <div class="letra">P</div>
        <div id="col-B"></div>
      </div>

      <div class="col">
        <div class="letra">I</div>
        <div id="col-I"></div>
      </div>

      <div class="col">
        <div class="letra">N</div>
        <div id="col-N"></div>
      </div>

      <div class="col">
        <div class="letra">G</div>
        <div id="col-G"></div>
      </div>

      <div class="col">
        <div class="letra">O</div>
        <div id="col-O"></div>
      </div>

    </div>

    <!-- 🧾 VERIFICADOR -->
    <div class="verificador">
      <input type="text" id="codigoCartilla" placeholder="Código de cartilla">
      <button onclick="verificarCartilla()">Verificar ganador</button>
      <button onclick="limpiarVerificador()">Limpiar</button>
    </div>

    <!-- 🧾 VISUALIZAR CARTILLA -->
    <div id="previewCartilla" class="preview hidden"></div>

  </div>

</div>

</body>
</html>
